server:
  host: "0.0.0.0"
  port: 3000
  base_path: "/v1"

minimax:
  api_key: "${MINIMAX_API_KEY}"
  base_url: "https://api.minimaxi.com"
  timeout: 120000

models:
  enabled:
    - "MiniMax-M2.7-highspeed"
    - "MiniMax-M2.5-highspeed"
    - "gpt-5.5"
    - "image-01"
  default: "MiniMax-M2.7-highspeed"

logging:
  level: "info"
  format: "simple"

rate_limit:
  enabled: true
  requests_per_minute: 60
