<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniMax Relay - Admin Dashboard</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #1e293b;
      --border: #334155;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --info: #3b82f6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span {
      font-size: 0.875rem;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg-secondary);
      border-radius: 9999px;
      border: 1px solid var(--border);
      font-size: 0.875rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    .status-dot.error {
      background: var(--error);
    }

    .status-dot.warning {
      background: var(--warning);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.25rem;
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-sub {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-body {
      padding: 1rem 1.25rem;
    }

    .model-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.5rem;
    }

    .model-tag {
      display: inline-flex;
      align-items: center;
      padding: 0.375rem 0.75rem;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 0.75rem;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      transition: all 0.2s;
    }

    .model-tag:hover {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.1);
    }

    .model-tag.text { border-left: 3px solid #3b82f6; }
    .model-tag.speech { border-left: 3px solid #22c55e; }
    .model-tag.video { border-left: 3px solid #f59e0b; }
    .model-tag.image { border-left: 3px solid #ec4899; }
    .model-tag.music { border-left: 3px solid #a855f7; }

    .config-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .config-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    .config-item:last-child {
      border-bottom: none;
    }

    .config-key {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .config-value {
      font-size: 0.875rem;
      font-family: 'SF Mono', Monaco, monospace;
      color: var(--text-primary);
      background: var(--bg-primary);
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
    }

    .section-title {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .api-tester {
      margin-top: 1rem;
    }

    .api-tester input,
    .api-tester textarea,
    .api-tester select {
      width: 100%;
      padding: 0.75rem;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }

    .api-tester textarea {
      min-height: 100px;
      resize: vertical;
    }

    .api-tester label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
    }

    .response-box {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-top: 1rem;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 0.75rem;
      max-height: 300px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .response-box.error {
      border-color: var(--error);
      color: var(--error);
    }

    .response-box.success {
      border-color: var(--success);
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .time {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .no-models {
      color: var(--text-secondary);
      font-size: 0.875rem;
      text-align: center;
      padding: 2rem;
    }

    .error-banner {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--error);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1rem;
      color: var(--error);
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
      font-size: 0.75rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }
  
    /* Model Type Tabs */
    .model-type-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }

    .tab-btn {
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .model-inputs {
      padding: 1rem;
      background: var(--bg-primary);
      border-radius: 0.5rem;
      margin-top: 0.5rem;
    }

  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <h1>🚀 MiniMax Relay</h1>
        <span id="version">v1.0.0</span>
      </div>
      <div class="status-badge">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">检查中...</span>
      </div>
    </header>

    <div id="errorBanner" class="error-banner" style="display: none;"></div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">服务状态</div>
        <div class="stat-value" id="serverStatus">-</div>
        <div class="stat-sub" id="serverUptime">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">文本模型</div>
        <div class="stat-value" id="textModelCount">-</div>
        <div class="stat-sub">Text Models</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">语音模型</div>
        <div class="stat-value" id="speechModelCount">-</div>
        <div class="stat-sub">Speech T2A</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">视频模型</div>
        <div class="stat-value" id="videoModelCount">-</div>
        <div class="stat-sub">Video Generation</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">图像模型</div>
        <div class="stat-value" id="imageModelCount">-</div>
        <div class="stat-sub">Image T2I</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">音乐模型</div>
        <div class="stat-value" id="musicModelCount">-</div>
        <div class="stat-sub">Music Gen</div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            💬 文本模型
          </div>
          <span class="time" id="textModelsUpdated">-</span>
        </div>
        <div class="card-body">
          <div class="model-grid" id="textModels"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">
            🎙️ 语音模型
          </div>
          <span class="time" id="speechModelsUpdated">-</span>
        </div>
        <div class="card-body">
          <div class="model-grid" id="speechModels"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">
            🎬 视频模型
          </div>
          <span class="time" id="videoModelsUpdated">-</span>
        </div>
        <div class="card-body">
          <div class="model-grid" id="videoModels"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">
            🖼️ 图像模型
          </div>
          <span class="time" id="imageModelsUpdated">-</span>
        </div>
        <div class="card-body">
          <div class="model-grid" id="imageModels"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">
            🎵 音乐模型
          </div>
          <span class="time" id="musicModelsUpdated">-</span>
        </div>
        <div class="card-body">
          <div class="model-grid" id="musicModels"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">
            ⚙️ 服务配置
          </div>
        </div>
        <div class="card-body">
          <div class="config-list" id="configList"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">
          🧪 API 测试
        </div>
        <button class="btn btn-secondary" onclick="refreshStatus()">
          🔄 刷新状态
        </button>
      </div>
      <div class="card-body">
        <div class="api-tester">
          <form id="testForm" onsubmit="return false;">
            
            <!-- Model Type Tabs -->
            <div class="model-type-tabs">
              <button type="button" class="tab-btn active" data-type="text" onclick="switchModelType('text')">📝 文本</button>
              <button type="button" class="tab-btn" data-type="speech" onclick="switchModelType('speech')">🎤 语音</button>
              <button type="button" class="tab-btn" data-type="video" onclick="switchModelType('video')">🎬 视频</button>
              <button type="button" class="tab-btn" data-type="image" onclick="switchModelType('image')">🖼️ 图片</button>
              <button type="button" class="tab-btn" data-type="music" onclick="switchModelType('music')">🎵 音乐</button>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
              <div>
                <label>模型</label>
                <select id="testModel">
                  <optgroup label="Text">
                  </optgroup>
                </select>
              </div>
              <div>
                <label>API Key</label>
                <input type="password" id="testApiKey" name="api_key" placeholder="输入 API Key" autocomplete="current-password">
              </div>
            </div>

            <!-- Text Model Inputs -->
            <div id="textInputs" class="model-inputs">
              <div style="margin-top: 1rem;">
                <label>提示词 (Prompt)</label>
                <textarea id="textPrompt" placeholder="输入你的问题...">你好，请用一句话介绍自己</textarea>
              </div>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.5rem;">
                <div>
                  <label>Max Tokens</label>
                  <input type="number" id="textMaxTokens" value="256" min="1" max="8192">
                </div>
                <div>
                  <label>Temperature</label>
                  <input type="number" id="textTemperature" value="0.7" min="0" max="2" step="0.1">
                </div>
              </div>
            </div>

            <!-- Speech Model Inputs -->
            <div id="speechInputs" class="model-inputs" style="display: none;">
              <div style="margin-top: 1rem;">
                <label>提示词 (Prompt) - 输入要转换为语音的文本</label>
                <textarea id="speechPrompt" placeholder="输入要转换为语音的文本..."></textarea>
              </div>
              <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-top: 0.5rem;">
                <div>
                  <label>声音</label>
                  <select id="speechVoice">
                    <option value="female-tianmei">女声-甜美</option>
                    <option value="female-yunxi">女声-知性</option>
                    <option value="male-yunyang">男声-专业</option>
                    <option value="male-john">男声-英文</option>
                    <option value="female-aria">女声-英文</option>
                  </select>
                </div>
                <div>
                  <label>输出格式</label>
                  <select id="speechFormat">
                    <option value="mp3">MP3</option>
                    <option value="wav">WAV</option>
                    <option value="opus">OPUS</option>
                  </select>
                </div>
                <div>
                  <label>语速</label>
                  <input type="number" id="speechSpeed" value="1.0" min="0.5" max="2.0" step="0.1">
                </div>
              </div>
            </div>

            <!-- Video Model Inputs -->
            <div id="videoInputs" class="model-inputs" style="display: none;">
              <div style="margin-top: 1rem;">
                <label>提示词 (Prompt) - 描述你想要生成的视频内容</label>
                <textarea id="videoPrompt" placeholder="描述视频内容，如：一只猫在草地上奔跑..."></textarea>
              </div>
              <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-top: 0.5rem;">
                <div>
                  <label>分辨率</label>
                  <select id="videoResolution">
                    <option value="720P">720P</option>
                    <option value="1080P">1080P</option>
                    <option value="768P">768P</option>
                  </select>
                </div>
                <div>
                  <label>时长</label>
                  <select id="videoDuration">
                    <option value="5">5秒</option>
                    <option value="6">6秒</option>
                    <option value="10">10秒</option>
                  </select>
                </div>
                <div>
                  <label>镜头模式</label>
                  <select id="videoCamera">
                    <option value="auto">自动</option>
                    <option value="远景">远景</option>
                    <option value="中景">中景</option>
                    <option value="特写">特写</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Image Model Inputs -->
            <div id="imageInputs" class="model-inputs" style="display: none;">
              <div style="margin-top: 1rem;">
                <label>提示词 (Prompt) - 描述你想要生成的图片</label>
                <textarea id="imagePrompt" placeholder="描述图片内容，如：一只可爱的橘猫在阳光下打盹..."></textarea>
              </div>
              <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-top: 0.5rem;">
                <div>
                  <label>尺寸</label>
                  <select id="imageSize">
                    <option value="1:1">1:1 (正方形)</option>
                    <option value="16:9">16:9 (宽屏)</option>
                    <option value="4:3">4:3</option>
                    <option value="3:2">3:2</option>
                    <option value="9:16">9:16 (竖屏)</option>
                    <option value="21:9">21:9 (超宽)</option>
                  </select>
                </div>
                <div>
                  <label>图片模型</label>
                  <select id="imageModelType">
                    <option value="image-01">image-01</option>
                    <option value="image-01-live">image-01-live</option>
                  </select>
                </div>
                <div>
                  <label>图片风格</label>
                  <select id="imageStyle">
                    <option value="expression好评">Expression好评</option>
                    <option value="摄影">摄影</option>
                    <option value="3D卡通">3D卡通</option>
                    <option value="动漫">动漫</option>
                    <option value="油画">油画</option>
                    <option value="素描">素描</option>
                    <option value="水彩">水彩</option>
                    <option value="扁平插画">扁平插画</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Music Model Inputs -->
            <div id="musicInputs" class="model-inputs" style="display: none;">
              <div style="margin-top: 1rem;">
                <label>提示词 (Prompt) - 描述你想要生成的音乐</label>
                <textarea id="musicPrompt" placeholder="描述音乐风格和内容，如：轻快的流行音乐，适合派对..."></textarea>
              </div>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.5rem;">
                <div>
                  <label>音乐风格</label>
                  <select id="musicStyle">
                    <option value="pop">流行</option>
                    <option value="electronic">电子</option>
                    <option value="rock">摇滚</option>
                    <option value="classical">古典</option>
                    <option value="jazz">爵士</option>
                    <option value="ambient">氛围</option>
                    <option value="folk">民谣</option>
                    <option value="hiphop">嘻哈</option>
                  </select>
                </div>
                <div>
                  <label>时长 (秒)</label>
                  <input type="number" id="musicDuration" value="30" min="10" max="180">
                </div>
              </div>
            </div>

            <!-- Media Preview Containers -->
            <div id="audioPreview" class="audio-preview" style="display: none; margin-top: 1rem;">
              <label>🔊 音频预览</label>
              <audio id="audioPlayer" controls style="width: 100%; margin-top: 0.5rem;"></audio>
            </div>

            <div id="imagePreview" class="image-preview" style="display: none; margin-top: 1rem;">
              <label>🖼️ 图片预览</label>
              <img id="imagePlayer" style="max-width: 100%; max-height: 300px; border-radius: 0.5rem; margin-top: 0.5rem;">
            </div>

            <div id="videoPreview" class="video-preview" style="display: none; margin-top: 1rem;">
              <label>🎬 视频预览</label>
              <video id="videoPlayer" controls style="max-width: 100%; max-height: 300px; border-radius: 0.5rem; margin-top: 0.5rem;"></video>
            </div>

            <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
              <button class="btn btn-primary" onclick="testAPI()">
                <span id="testBtn">🚀 发送测试</span>
              </button>
              <button class="btn btn-secondary" onclick="testHealth()">
                ❤️ 健康检查
              </button>
            </div>
            <div class="response-box" id="testResponse" style="display: none;"></div>
          </form>
        </div>
      </div>
    </div>

    <footer>
      MiniMax Relay Platform · OpenAI Compatible API Relay
    </footer>
  </div>

  <script>
    const API_BASE = '';
    
    // Global storage for categorized models
    let allModels = { text: [], speech: [], video: [], image: [], music: [] };
    let currentModelType = 'text';

    async function fetchStatus() {
      try {
        const res = await fetch(`${API_BASE}/health`);
        const data = await res.json();
        updateStatus(true, data);
        await fetchModels();
      } catch (err) {
        updateStatus(false, { error: err.message });
      }
    }

    function updateStatus(ok, data) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      const serverStatus = document.getElementById('serverStatus');
      const serverUptime = document.getElementById('serverUptime');

      if (ok) {
        dot.className = 'status-dot';
        text.textContent = '运行中';
        serverStatus.textContent = 'OK';
        serverStatus.style.color = 'var(--success)';
        serverUptime.textContent = new Date(data.timestamp).toLocaleString('zh-CN');
      } else {
        dot.className = 'status-dot error';
        text.textContent = '离线';
        serverStatus.textContent = 'ERROR';
        serverStatus.style.color = 'var(--error)';
        serverUptime.textContent = data.error || '';
      }
    }

    async function fetchModels() {
      try {
        const res = await fetch(`${API_BASE}/v1/models`);
        const data = await res.json();
        categorizeModels(data.data || []);
        populateModelSelect(data.data || []);
        document.getElementById('errorBanner').style.display = 'none';
      } catch (err) {
        showError('获取模型列表失败: ' + err.message);
      }
    }

    function categorizeModels(models) {
      const categories = {
        text: [],
        speech: [],
        video: [],
        image: [],
        music: []
      };
      
      // Store globally for model type switching
      allModels = categories;

      const textPrefixes = ['MiniMax-M2', 'M2-her', 'gpt-'];
      const speechPrefixes = ['speech-'];
      const videoPrefixes = ['MiniMax-Hailuo', 'T2V-'];
      const imagePrefixes = ['image-'];
      const musicPrefixes = ['music-'];

      models.forEach(m => {
        const id = m.id || m;
        if (textPrefixes.some(p => id.includes(p))) categories.text.push(id);
        else if (speechPrefixes.some(p => id.includes(p))) categories.speech.push(id);
        else if (videoPrefixes.some(p => id.includes(p))) categories.video.push(id);
        else if (imagePrefixes.some(p => id.includes(p))) categories.image.push(id);
        else if (musicPrefixes.some(p => id.includes(p))) categories.music.push(id);
        else categories.text.push(id);
      });

      renderModels('textModels', categories.text, 'text');
      renderModels('speechModels', categories.speech, 'speech');
      renderModels('videoModels', categories.video, 'video');
      renderModels('imageModels', categories.image, 'image');
      renderModels('musicModels', categories.music, 'music');

      document.getElementById('textModelCount').textContent = categories.text.length;
      document.getElementById('speechModelCount').textContent = categories.speech.length;
      document.getElementById('videoModelCount').textContent = categories.video.length;
      document.getElementById('imageModelCount').textContent = categories.image.length;
      document.getElementById('musicModelCount').textContent = categories.music.length;

      const now = new Date().toLocaleTimeString('zh-CN');
      ['text', 'speech', 'video', 'image', 'music'].forEach(cat => {
        const el = document.getElementById(cat + 'ModelsUpdated');
        if (el) el.textContent = now;
      });
    }

    function renderModels(elementId, models, type) {
      const el = document.getElementById(elementId);
      if (!el) return;

      if (models.length === 0) {
        el.innerHTML = '<div class="no-models">暂无模型</div>';
        return;
      }

      el.innerHTML = models.map(m => `<span class="model-tag ${type}">${m}</span>`).join('');
    }

    function populateModelSelect(models) {
      const select = document.getElementById('testModel');
      
      // Build optgroups for all model types
      const optgroups = [
        { label: '📝 文本 (Text)', models: allModels.text, type: 'text' },
        { label: '🎤 语音 (Speech)', models: allModels.speech, type: 'speech' },
        { label: '🎬 视频 (Video)', models: allModels.video, type: 'video' },
        { label: '🖼️ 图片 (Image)', models: allModels.image, type: 'image' },
        { label: '🎵 音乐 (Music)', models: allModels.music, type: 'music' }
      ];
      
      let html = '';
      optgroups.forEach(group => {
        if (group.models.length > 0) {
          html += `<optgroup label="${group.label}">`;
          html += group.models.map(m => `<option value="${m}">${m}</option>`).join('');
          html += '</optgroup>';
        }
      });
      
      select.innerHTML = html;
      
      // Initialize with text models
      updateModelDropdown('text');
    }
    
    function updateModelDropdown(type) {
      const select = document.getElementById('testModel');
      const modelOptions = select.querySelectorAll('option');
      const optgroups = select.querySelectorAll('optgroup');
      
      // Disable all options first
      optgroups.forEach(group => {
        group.querySelectorAll('option').forEach(opt => {
          opt.style.display = 'none';
        });
      });
      
      // Enable options for the selected type
      const typeLabels = {
        'text': '📝 文本 (Text)',
        'speech': '🎤 语音 (Speech)',
        'video': '🎬 视频 (Video)',
        'image': '🖼️ 图片 (Image)',
        'music': '🎵 音乐 (Music)'
      };
      
      optgroups.forEach(group => {
        if (group.label === typeLabels[type]) {
          group.querySelectorAll('option').forEach(opt => {
            opt.style.display = '';
          });
        }
      });
    }
    
    function switchModelType(type) {
      // Update tab buttons
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.type === type) {
          btn.classList.add('active');
        }
      });
      
      // Hide all input panels
      document.querySelectorAll('.model-inputs').forEach(panel => {
        panel.style.display = 'none';
      });
      
      // Show selected input panel
      const inputPanel = document.getElementById(type + 'Inputs');
      if (inputPanel) {
        inputPanel.style.display = 'block';
      }
      
      // Hide all preview panels
      document.getElementById('audioPreview').style.display = 'none';
      document.getElementById('imagePreview').style.display = 'none';
      document.getElementById('videoPreview').style.display = 'none';
      
      // Update dropdown
      currentModelType = type;
      updateModelDropdown(type);
    }

    function showError(msg) {
      const banner = document.getElementById('errorBanner');
      banner.textContent = msg;
      banner.style.display = 'block';
    }

    function refreshStatus() {
      fetchStatus();
    }

    async function testHealth() {
      const responseBox = document.getElementById('testResponse');
      responseBox.style.display = 'block';
      responseBox.className = 'response-box';
      responseBox.textContent = '检查中...';

      try {
        const res = await fetch(`${API_BASE}/health`);
        const data = await res.json();
        responseBox.className = 'response-box success';
        responseBox.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        responseBox.className = 'response-box error';
        responseBox.textContent = '请求失败: ' + err.message;
      }
    }

    async function testAPI() {
      const responseBox = document.getElementById('testResponse');
      const btn = document.getElementById('testBtn');
      const apiKey = document.getElementById('testApiKey').value;

      // Hide all previews first
      document.getElementById('audioPreview').style.display = 'none';
      document.getElementById('imagePreview').style.display = 'none';
      document.getElementById('videoPreview').style.display = 'none';

      responseBox.style.display = 'block';
      responseBox.className = 'response-box';
      responseBox.textContent = '发送中...';
      btn.innerHTML = '<span class="loading"></span> 发送中...';
      btn.disabled = true;

      const headers = { 'Content-Type': 'application/json' };
      if (apiKey) {
        headers['x-api-key'] = apiKey;
        saveApiKey(apiKey);
      }

      try {
        let endpoint, body, method = 'POST';
        
        switch (currentModelType) {
          case 'text':
            endpoint = '/v1/chat/completions';
            body = {
              model: document.getElementById('testModel').value,
              messages: [{ role: 'user', content: document.getElementById('textPrompt').value }],
              max_tokens: parseInt(document.getElementById('textMaxTokens').value) || 256,
              temperature: parseFloat(document.getElementById('textTemperature').value) || 0.7
            };
            break;
            
          case 'speech':
            endpoint = '/v1/audio/speech';
            body = {
              model: document.getElementById('testModel').value,
              input: document.getElementById('speechPrompt').value,
              voice: document.getElementById('speechVoice').value,
              response_format: document.getElementById('speechFormat').value,
              speed: parseFloat(document.getElementById('speechSpeed').value) || 1.0
            };
            break;
            
          case 'video':
            endpoint = '/v1/video_generation';
            body = {
              model: document.getElementById('testModel').value,
              prompt: document.getElementById('videoPrompt').value,
              resolution: document.getElementById('videoResolution').value,
              duration: parseInt(document.getElementById('videoDuration').value) || 6
            };
            break;
            
          case 'image':
            endpoint = '/v1/images/generations';
            body = {
              model: document.getElementById('imageModelType').value,
              prompt: document.getElementById('imagePrompt').value,
              size: document.getElementById('imageSize').value,
              style: document.getElementById('imageStyle').value
            };
            break;
            
          case 'music':
            endpoint = '/v1/music_generation';
            body = {
              model: document.getElementById('testModel').value,
              prompt: document.getElementById('musicPrompt').value,
              duration: parseInt(document.getElementById('musicDuration').value) || 30
            };
            break;
        }

        const res = await fetch(`${API_BASE}${endpoint}`, {
          method,
          headers,
          body: JSON.stringify(body)
        });

        // Handle different response types
        const contentType = res.headers.get('content-type') || '';
        
        if (contentType.includes('audio') || contentType.includes('mpeg') || contentType.includes('mp3') || contentType.includes('wav') || contentType.includes('opus')) {
          // Audio response (speech)
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          document.getElementById('audioPlayer').src = url;
          document.getElementById('audioPreview').style.display = 'block';
          responseBox.className = 'response-box success';
          responseBox.textContent = `✅ ${currentModelType.toUpperCase()} 生成成功！\n音频已加载到上方预览区`;
        } else if (contentType.includes('image') || contentType.includes('png') || contentType.includes('jpeg') || contentType.includes('webp')) {
          // Image response
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          document.getElementById('imagePlayer').src = url;
          document.getElementById('imagePreview').style.display = 'block';
          responseBox.className = 'response-box success';
          responseBox.textContent = `✅ ${currentModelType.toUpperCase()} 生成成功！\n图片已加载到上方预览区`;
        } else if (contentType.includes('video') || contentType.includes('mp4')) {
          // Video response
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          document.getElementById('videoPlayer').src = url;
          document.getElementById('videoPreview').style.display = 'block';
          responseBox.className = 'response-box success';
          responseBox.textContent = `✅ ${currentModelType.toUpperCase()} 生成成功！\n视频已加载到上方预览区`;
        } else {
          // JSON response
          const data = await res.json();
          
          if (!res.ok) {
            responseBox.className = 'response-box error';
            responseBox.textContent = `HTTP ${res.status}\n\n${JSON.stringify(data, null, 2)}`;
          } else {
            responseBox.className = 'response-box success';
            
            if (currentModelType === 'text') {
              const content = data.choices?.[0]?.message?.content || '无响应内容';
              responseBox.textContent = `模型: ${data.model}\n\n回复:\n${content}`;
            } else if (currentModelType === 'video' || currentModelType === 'music' || currentModelType === 'image') {
              responseBox.textContent = JSON.stringify(data, null, 2);
            } else {
              responseBox.textContent = JSON.stringify(data, null, 2);
            }
          }
        }
      } catch (err) {
        responseBox.className = 'response-box error';
        responseBox.textContent = '请求失败: ' + err.message;
      } finally {
        btn.innerHTML = '🚀 发送测试';
        btn.disabled = false;
      }
    }

    // Load config info
    async function loadConfig() {
      try {
        const res = await fetch(`${API_BASE}/api/status`);
        const data = await res.json();
        renderConfig(data);
      } catch (err) {
        // If /api/status doesn't exist, use defaults
        renderConfig({
          server: { host: '0.0.0.0', port: 3000, base_path: '/v1' },
          rate_limit: { requests_per_minute: 60 },
          relay: { bypass_model_check: true }
        });
      }
    }

    function renderConfig(data) {
      const list = document.getElementById('configList');
      const items = [
        { key: '服务器地址', value: `${data.server?.host || '-'}:${data.server?.port || '-'}` },
        { key: 'API Base Path', value: data.server?.base_path || '/v1' },
        { key: 'Rate Limit', value: `${data.rate_limit?.requests_per_minute || '-'} req/min` },
        { key: 'Relay Mode', value: data.relay?.bypass_model_check ? '启用' : '禁用' },
        { key: 'CORS', value: data.relay?.allowed_origins || '*' },
        { key: 'API Key Header', value: data.relay?.api_key_header || 'x-api-key' }
      ];

      list.innerHTML = items.map(item => `
        <div class="config-item">
          <span class="config-key">${item.key}</span>
          <span class="config-value">${item.value}</span>
        </div>
      `).join('');
    }

    function saveApiKey(key) {
      if (key) {
        localStorage.setItem('minimax_relay_api_key', key);
      }
    }

    function loadApiKey() {
      const savedKey = localStorage.getItem('minimax_relay_api_key');
      if (savedKey) {
        document.getElementById('testApiKey').value = savedKey;
      }
    }

    // Initialize
    fetchStatus();
    loadConfig();
    loadApiKey();

    // Auto refresh every 30 seconds
    setInterval(fetchStatus, 30000);
  </script>
</body>
</html>
